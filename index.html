    <script>
      // set the first-visit class on the root element early to prevent flicker
      (function(){
        try{
          var key='shotsbyfra_first_visit_v1';
          if(!localStorage.getItem(key)){
            document.documentElement.classList.add('first-visit');
            localStorage.setItem(key,'1');
            // remove the class after animations so subsequent navigation is normal
            setTimeout(function(){ document.documentElement.classList.remove('first-visit'); }, 1400);
          }
        }catch(e){}
      })();
    </script>
